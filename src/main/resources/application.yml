server:
  port: 8080

spring:
  application:
    name: open-models-demo

# Ollama configuration
ollama:
  base-url: http://localhost:11434
  chat-model: qwen2.5:0.5b
  embedding-model: nomic-embed-text

# RAG configuration
rag:
  docs-dir: docs
  chunk-size: 500
  chunk-overlap: 50
  max-results: 5
  min-score: 0.7

# Structured output configuration
structured:
  max-retries: 2
