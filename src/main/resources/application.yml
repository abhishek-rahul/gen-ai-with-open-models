server:
  port: 8080

spring:
  application:
    name: open-models-demo
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen2.5:0.5b
          temperature: 0.7
      embedding:
        options:
          model: nomic-embed-text

# Kept for response payloads and scripts that refer to the demo model names.
ollama:
  base-url: http://localhost:11434
  chat-model: qwen2.5:0.5b
  embedding-model: nomic-embed-text

# RAG configuration
rag:
  docs-dir: docs
  chunk-size: 500
  chunk-overlap: 50
  max-results: 5
  min-score: 0.7

logging:
  level:
    org.springframework.ai.chat.client.advisor: DEBUG
