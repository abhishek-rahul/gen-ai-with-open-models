server:
  port: 8080

spring:
  application:
    name: open-models-demo

# Ollama configuration
ollama:
  base-url: http://localhost:11434
  chat-model: qwen2.5:0.5b
  embedding-model: nomic-embed-text

# RAG configuration
rag:
  docs-dir: docs
  chunk-size: 500
  chunk-overlap: 50
  max-results: 5
  min-score: 0.7

# Vector database configuration
vector-store:
  type: elasticsearch # elasticsearch | in-memory
  abstraction: LangChain4j EmbeddingStore; Spring AI equivalent is VectorStore
  elasticsearch:
    url: http://localhost:9200
    index-name: javaone-rag-vectors
    api-key:
    username:
    password:
    dimensions: 768 # nomic-embed-text dense vector dimension
    num-candidates: 100 # HNSW candidate pool for approximate kNN
