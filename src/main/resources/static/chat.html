<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Abhisha GPT</title>
    <style>
        :root {
            color-scheme: light;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f6f7f9;
            color: #1f2933;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr;
        }

        header {
            padding: 18px 24px;
            border-bottom: 1px solid #d8dee6;
            background: #ffffff;
        }

        h1 {
            margin: 0;
            font-size: 1.15rem;
            font-weight: 650;
        }

        main {
            width: min(980px, 100%);
            margin: 0 auto;
            padding: 22px;
            display: grid;
            grid-template-rows: 1fr auto;
            gap: 16px;
        }

        #conversation {
            min-height: 360px;
            padding: 18px;
            overflow-y: auto;
            background: #ffffff;
            border: 1px solid #d8dee6;
            border-radius: 8px;
        }

        .message {
            max-width: 82%;
            margin: 0 0 14px;
            padding: 12px 14px;
            border-radius: 8px;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .user {
            margin-left: auto;
            background: #dff5ec;
        }

        .assistant {
            background: #edf2f7;
        }

        .meta {
            margin-top: 8px;
            color: #5f6b7a;
            font-size: 0.85rem;
        }

        form {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 10px;
            align-items: center;
        }

        input {
            width: 100%;
            min-height: 44px;
            padding: 0 12px;
            border: 1px solid #b8c2cc;
            border-radius: 8px;
            font: inherit;
        }

        button {
            min-height: 44px;
            padding: 0 16px;
            border: 1px solid #1f2933;
            border-radius: 8px;
            background: #1f2933;
            color: #ffffff;
            font: inherit;
            cursor: pointer;
        }

        button.secondary {
            background: #ffffff;
            color: #1f2933;
        }

        button:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        @media (max-width: 680px) {
            main {
                padding: 14px;
            }

            form {
                grid-template-columns: 1fr;
            }

            .message {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
<header>
    <h1>Abhisha GPT</h1>
</header>
<main>
    <section id="conversation" aria-live="polite"></section>
    <form id="chatForm">
        <input id="messageInput" name="message" autocomplete="off" placeholder="Ask about Java, Spring Boot, or local models">
        <button id="streamButton" type="submit">Stream</button>
        <button id="normalButton" class="secondary" type="button">Normal</button>
    </form>
</main>
<script>
    const conversation = document.querySelector("#conversation");
    const form = document.querySelector("#chatForm");
    const input = document.querySelector("#messageInput");
    const streamButton = document.querySelector("#streamButton");
    const normalButton = document.querySelector("#normalButton");

    let activeStream;

    function addMessage(role, text = "") {
        const item = document.createElement("div");
        item.className = `message ${role}`;
        item.textContent = text;
        conversation.appendChild(item);
        conversation.scrollTop = conversation.scrollHeight;
        return item;
    }

    function setBusy(isBusy) {
        streamButton.disabled = isBusy;
        normalButton.disabled = isBusy;
        input.disabled = isBusy;
    }

    function closeActiveStream() {
        if (activeStream) {
            activeStream.close();
            activeStream = null;
        }
    }

    form.addEventListener("submit", (event) => {
        event.preventDefault();
        const message = input.value.trim();
        if (!message) {
            return;
        }

        closeActiveStream();
        addMessage("user", message);
        const assistantMessage = addMessage("assistant");
        input.value = "";
        setBusy(true);

        activeStream = new EventSource(`/chat/stream?message=${encodeURIComponent(message)}`);

        activeStream.addEventListener("token", (event) => {
            const payload = JSON.parse(event.data);
            assistantMessage.textContent += payload.token;
            conversation.scrollTop = conversation.scrollHeight;
        });

        activeStream.addEventListener("complete", (event) => {
            const payload = JSON.parse(event.data);
            const meta = document.createElement("div");
            meta.className = "meta";
            meta.textContent = `First token: ${payload.first_token_latency_ms} ms | Total: ${payload.total_latency_ms} ms | Tokens: ${payload.tokens_streamed}`;
            assistantMessage.appendChild(meta);
            closeActiveStream();
            setBusy(false);
            input.focus();
        });

        activeStream.addEventListener("error", () => {
            assistantMessage.textContent += assistantMessage.textContent ? "\n\nStreaming error." : "Streaming error.";
            closeActiveStream();
            setBusy(false);
            input.focus();
        });
    });

    normalButton.addEventListener("click", async () => {
        const message = input.value.trim();
        if (!message) {
            return;
        }

        closeActiveStream();
        addMessage("user", message);
        const assistantMessage = addMessage("assistant", "Thinking...");
        input.value = "";
        setBusy(true);

        try {
            const response = await fetch(`/chat/normal?message=${encodeURIComponent(message)}`);
            const payload = await response.json();
            assistantMessage.textContent = payload.answer;
            const meta = document.createElement("div");
            meta.className = "meta";
            meta.textContent = `Total: ${payload.latency_ms} ms`;
            assistantMessage.appendChild(meta);
        } catch (error) {
            assistantMessage.textContent = `Normal response failed: ${error.message}`;
        } finally {
            setBusy(false);
            input.focus();
        }
    });
</script>
</body>
</html>
